<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedCheck · Analytics</title>
    <meta name="robots" content="noindex, nofollow">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/cima-app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <style>
        /* =============================================
           ANALYTICS — estilos específicos
           ============================================= */
        body { background: var(--bg-dark); color: var(--text-primary); font-family: 'Inter', sans-serif; }

        .analytics-layout {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 1rem 4rem;
        }

        /* HEADER */
        .analytics-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-default);
        }
        .analytics-brand {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .analytics-brand i { color: var(--primary); }
        .analytics-brand .brand-sub {
            font-size: .75rem;
            font-weight: 500;
            color: var(--primary);
            background: var(--primary-light);
            padding: .15rem .5rem;
            border-radius: 4px;
            margin-left: .2rem;
        }
        .back-link {
            font-size: .85rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .4rem;
            transition: color .15s;
        }
        .back-link:hover { color: var(--primary); }

        /* PERIOD SELECTOR */
        .period-bar {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
        }
        .period-label {
            font-size: .8rem;
            color: var(--text-muted);
            margin-right: .25rem;
        }
        .period-btn {
            padding: .35rem .9rem;
            border-radius: 6px;
            border: 1px solid var(--border-default);
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-size: .85rem;
            cursor: pointer;
            transition: all .15s;
        }
        .period-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
        .period-btn.active {
            background: var(--primary-light);
            border-color: var(--border-active);
            color: var(--primary);
            font-weight: 500;
        }
        .refresh-btn {
            margin-left: auto;
            padding: .35rem .9rem;
            border-radius: 6px;
            border: 1px solid var(--border-default);
            background: transparent;
            color: var(--text-muted);
            font-size: .85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: .4rem;
            transition: all .15s;
        }
        .refresh-btn:hover { color: var(--primary); border-color: var(--border-active); }
        .refresh-btn.loading i { animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SECTION NAV */
        .section-nav {
            display: flex;
            gap: .35rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            padding-bottom: .25rem;
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-dark);
            padding-top: .5rem;
        }
        .snav-btn {
            padding: .4rem .75rem;
            border-radius: 6px;
            border: 1px solid var(--border-default);
            background: var(--bg-surface);
            color: var(--text-muted);
            font-size: .78rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: .35rem;
        }
        .snav-btn:hover { color: var(--text-primary); border-color: var(--border-hover); }
        .snav-btn.active {
            background: var(--primary-light);
            border-color: var(--border-active);
            color: var(--primary);
        }

        /* SCROLL OFFSET FOR SECTIONS */
        [id^="sec-"] { scroll-margin-top: 3.5rem; }

        /* SUMMARY CARDS */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.75rem;
        }
        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: .3rem;
        }
        .stat-card .stat-label {
            font-size: .75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .04em;
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.1;
            color: var(--text-primary);
        }
        .stat-card .stat-note {
            font-size: .75rem;
            color: var(--text-muted);
        }
        .stat-card.accent-primary .stat-value { color: var(--primary); }
        .stat-card.accent-success .stat-value { color: #34d399; }
        .stat-card.accent-warn .stat-value { color: #fbbf24; }
        .stat-card.accent-purple .stat-value { color: #a78bfa; }

        /* CHARTS GRID */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .charts-grid-equal {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        @media (max-width: 700px) {
            .charts-grid, .charts-grid-equal { grid-template-columns: 1fr; }
        }

        /* CHART CARDS */
        .chart-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
        }
        .chart-card-title {
            font-size: .8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .chart-card-title i { color: var(--primary); }
        .chart-subtitle {
            font-size: .8rem;
            color: var(--text-muted);
            margin: -.5rem 0 1rem;
            line-height: 1.4;
        }
        .chart-wrap { position: relative; }

        /* TABLE CARD */
        .table-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
        }
        .analytics-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .875rem;
        }
        .analytics-table th {
            text-align: left;
            padding: .6rem .75rem;
            font-size: .7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-default);
        }
        .analytics-table td {
            padding: .65rem .75rem;
            border-bottom: 1px solid var(--border-default);
            color: var(--text-secondary);
            vertical-align: middle;
        }
        .analytics-table tr:last-child td { border-bottom: none; }
        .analytics-table tr:hover td { background: var(--bg-surface-hover); }
        .analytics-table .term-name {
            font-family: monospace;
            font-size: .9rem;
            color: var(--text-primary);
        }
        .analytics-table .badge {
            display: inline-block;
            padding: .1rem .45rem;
            border-radius: 4px;
            font-size: .7rem;
            font-weight: 500;
        }
        .badge-nombre { background: rgba(14,165,233,.15); color: #38bdf8; }
        .badge-nregistro { background: rgba(168,85,247,.15); color: #c084fc; }
        .badge-atc { background: rgba(52,211,153,.15); color: #34d399; }
        .badge-indicacion { background: rgba(251,191,36,.15); color: #fbbf24; }
        .badge-pa { background: rgba(52,211,153,.15); color: #34d399; }
        .badge-cn { background: rgba(251,191,36,.15); color: #fbbf24; }

        /* BAR INLINE */
        .bar-wrap { display: flex; align-items: center; gap: .6rem; }
        .bar-track {
            flex: 1;
            height: 6px;
            background: var(--bg-elevated, #263445);
            border-radius: 99px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 99px;
        }
        .bar-count { min-width: 1.8rem; text-align: right; font-weight: 600; color: var(--text-primary); }

        /* ENDPOINT LIST */
        .endpoint-list { list-style: none; padding: 0; margin: 0; }
        .endpoint-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .65rem 0;
            border-bottom: 1px solid var(--border-default);
            font-size: .875rem;
        }
        .endpoint-item:last-child { border-bottom: none; }
        .endpoint-path {
            font-family: monospace;
            color: var(--text-primary);
            font-size: .85rem;
        }
        .endpoint-count {
            font-weight: 600;
            color: var(--primary);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: .875rem;
        }
        .empty-state i { font-size: 1.75rem; display: block; margin-bottom: .75rem; opacity: .4; }
        .empty-state p { margin: 0; }
        .empty-state .note {
            margin-top: .5rem;
            font-size: .8rem;
            color: var(--primary);
            opacity: .8;
        }

        /* INFO BANNER */
        .info-banner {
            background: rgba(14,165,233,.08);
            border: 1px solid rgba(14,165,233,.25);
            border-radius: 8px;
            padding: .75rem 1rem;
            font-size: .8rem;
            color: var(--primary);
            display: flex;
            align-items: flex-start;
            gap: .6rem;
            margin-bottom: 1.5rem;
        }
        .info-banner i { margin-top: .05rem; flex-shrink: 0; }

        /* LOADING / ERROR */
        .state-loading, .state-error {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }
        .state-loading i, .state-error i {
            font-size: 2rem;
            display: block;
            margin-bottom: 1rem;
        }
        .state-loading i { color: var(--primary); animation: spin .8s linear infinite; }
        .state-error i { color: #f87171; }
        .state-error p { color: var(--text-secondary); }

        /* UPDATE TIMESTAMP */
        .update-ts {
            text-align: right;
            font-size: .75rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        /* TAXONOMY REF TABLE */
        .taxonomy-ref {
            width: 100%;
            border-collapse: collapse;
            font-size: .78rem;
            margin-top: 1rem;
        }
        .taxonomy-ref th {
            text-align: left;
            padding: .4rem .5rem;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-default);
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .taxonomy-ref td {
            padding: .35rem .5rem;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255,255,255,.03);
        }
        .taxonomy-ref tr:last-child td { border-bottom: none; }
        .taxonomy-ref .tax-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: .4rem;
        }

        /* DRILL-DOWN BY VISTA */
        .drill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: .75rem;
            margin-top: 1rem;
        }
        .drill-card {
            background: var(--bg-dark);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            padding: .75rem 1rem;
        }
        .drill-card h4 {
            font-size: .78rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: .5rem;
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .drill-card h4 i { font-size: .7rem; }
        .drill-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .drill-list li {
            font-size: .8rem;
            color: var(--text-muted);
            padding: .15rem 0;
            display: flex;
            justify-content: space-between;
        }
        .drill-list li span:last-child {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* BENCHMARK */
        .benchmark-panel { padding: .5rem 0; }
        .benchmark-your-data {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
        }
        .benchmark-stat { display: flex; flex-direction: column; }
        .benchmark-stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.1;
        }
        .benchmark-stat-label {
            font-size: .75rem;
            color: var(--text-muted);
            margin-top: .15rem;
        }
        .benchmark-calc {
            display: flex;
            align-items: center;
            gap: .5rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
            padding: 1rem;
            background: var(--bg-dark);
            border-radius: 8px;
            border: 1px solid var(--border-default);
        }
        .benchmark-input-label {
            font-size: .82rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .benchmark-input {
            width: 100px;
            padding: .4rem .6rem;
            border-radius: 6px;
            border: 1px solid var(--border-default);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-size: .9rem;
            font-family: inherit;
        }
        .benchmark-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .benchmark-result {
            text-align: center;
            margin: 1rem 0;
        }
        .benchmark-rate-value {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.1;
        }
        .benchmark-rate-label {
            font-size: .8rem;
            color: var(--text-muted);
            display: block;
            margin-top: .25rem;
        }
        .benchmark-interpretation {
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .85rem;
            line-height: 1.5;
            margin: 1rem 0;
            display: flex;
            align-items: flex-start;
            gap: .5rem;
        }
        .benchmark-interpretation i { margin-top: .15rem; flex-shrink: 0; }
        .interp-low { background: rgba(251,191,36,.08); color: #fbbf24; border: 1px solid rgba(251,191,36,.2); }
        .interp-normal { background: rgba(52,211,153,.08); color: #34d399; border: 1px solid rgba(52,211,153,.2); }
        .interp-good { background: rgba(14,165,233,.08); color: #0ea5e9; border: 1px solid rgba(14,165,233,.2); }
        .interp-high { background: rgba(168,85,247,.08); color: #c084fc; border: 1px solid rgba(168,85,247,.2); }
        .benchmark-refs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.25rem 0;
        }
        .benchmark-ref {
            background: var(--bg-dark);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            padding: 1rem;
        }
        .benchmark-ref-title {
            font-size: .85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: .25rem;
        }
        .benchmark-ref-detail {
            font-size: .75rem;
            color: var(--text-muted);
        }
        .benchmark-ref-rate {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin: .5rem 0 .25rem;
        }
        .benchmark-ref-rate small {
            font-size: .7rem;
            font-weight: 400;
            color: var(--text-muted);
        }
        .benchmark-ref-note {
            font-size: .75rem;
            color: var(--text-muted);
        }
        .benchmark-context {
            margin-top: 1rem;
            padding: .75rem 1rem;
            background: rgba(14,165,233,.05);
            border-radius: 8px;
            font-size: .8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .benchmark-context p { margin: 0 0 .5rem; }
        .benchmark-context p:last-child { margin-bottom: 0; }
        .benchmark-context i { color: var(--primary); }
        @media (max-width: 700px) {
            .benchmark-refs { grid-template-columns: 1fr; }
        }

        /* EXPORT */
        .export-actions {
            display: flex;
            gap: .75rem;
            flex-wrap: wrap;
        }
        .export-btn {
            padding: .6rem 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border-default);
            background: var(--bg-dark);
            color: var(--text-secondary);
            font-size: .85rem;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: .5rem;
            transition: all .15s;
        }
        .export-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .export-btn i { font-size: 1rem; }
    </style>
</head>
<body>

<div class="analytics-layout">

    <!-- HEADER -->
    <header class="analytics-header">
        <div class="analytics-brand">
            <i class="fas fa-chart-bar"></i>
            MedCheck
            <span class="brand-sub">ANALYTICS</span>
        </div>
        <a href="medcheck.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Volver a MedCheck
        </a>
    </header>

    <!-- PERIOD SELECTOR -->
    <div class="period-bar">
        <span class="period-label"><i class="fas fa-calendar-alt"></i> Periodo:</span>
        <button class="period-btn" data-dias="7">7 días</button>
        <button class="period-btn active" data-dias="30">30 días</button>
        <button class="period-btn" data-dias="90">90 días</button>
        <button class="refresh-btn" id="refresh-btn">
            <i class="fas fa-sync-alt"></i> Actualizar
        </button>
    </div>

    <!-- MAIN CONTENT (se rellena con JS) -->
    <div id="analytics-root">
        <div class="state-loading">
            <i class="fas fa-spinner"></i>
            <p>Cargando datos…</p>
        </div>
    </div>

</div>

<script>
// ─── CONSTANTS ──────────────────────────────────────────────────────────────────
const WORKER = 'https://medcheck-proxy.medtools.workers.dev';

const TAXONOMY = {
    buscar:        { label: 'Búsqueda / identificación',  ely: 'Orientación, composición, nombre del fármaco', icon: 'fa-search',              color: '#60a5fa', section: '—' },
    indicaciones:  { label: 'Indicaciones / eficacia',     ely: 'Indicaciones, fármaco de elección',             icon: 'fa-stethoscope',         color: '#34d399', section: '4.1' },
    seguridad:     { label: 'Seguridad / precauciones',    ely: 'Contraindicaciones y precauciones',             icon: 'fa-shield-alt',          color: '#fb923c', section: '4.3–4.4' },
    interacciones: { label: 'Interacciones',               ely: 'Interacciones medicamentosas',                  icon: 'fa-random',              color: '#a78bfa', section: '4.5' },
    reacciones:    { label: 'Efectos adversos / RAM',      ely: 'Reacciones adversas, causalidad inversa',       icon: 'fa-exclamation-triangle', color: '#f87171', section: '4.8' },
    equivalencias: { label: 'Alternativas / composición',  ely: 'Composición, genéricos, alternativas',          icon: 'fa-exchange-alt',        color: '#22d3ee', section: '—' },
    suministro:    { label: 'Disponibilidad',              ely: 'Disponibilidad del fármaco',                    icon: 'fa-boxes',               color: '#fbbf24', section: '—' },
    alertas:       { label: 'Alertas de seguridad',        ely: 'Alertas regulatorias (AEMPS)',                  icon: 'fa-bell',                color: '#f472b6', section: '—' },
    perfil:        { label: 'Gestión de perfil',           ely: '—',                                             icon: 'fa-star',                color: '#94a3b8', section: '—' },
};

const CONTEXTS = {
    embarazo:  { label: 'Embarazo',           icon: 'fa-baby',           color: '#f472b6', section: '4.6' },
    lactancia: { label: 'Lactancia',          icon: 'fa-baby-carriage',  color: '#c084fc', section: '4.6' },
    elderly:   { label: 'Mayor 65 años',      icon: 'fa-user-clock',     color: '#fbbf24', section: '4.2/4.4/4.8' },
    driving:   { label: 'Conducción',         icon: 'fa-car',            color: '#60a5fa', section: '4.7' },
    renal:     { label: 'Insuf. renal',       icon: 'fa-droplet',        color: '#34d399', section: '4.2/4.4' },
    hepatic:   { label: 'Insuf. hepática',    icon: 'fa-disease',        color: '#fb923c', section: '4.2/4.4' },
};

const SEARCH_TYPES = {
    nombre:           { label: 'Nombre comercial',  color: '#38bdf8' },
    principio_activo: { label: 'Principio activo',   color: '#34d399' },
    atc:              { label: 'Código ATC',         color: '#a78bfa' },
    nregistro:        { label: 'Nº registro',        color: '#c084fc' },
    codigo_nacional:  { label: 'Código nacional',    color: '#fbbf24' },
    otro:             { label: 'Otro',               color: '#94a3b8' },
};

const WEEKDAYS = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];

const ATC_LEVEL1 = {
    'A': { name: 'Digestivo y Metabolismo', icon: 'utensils', color: '#10b981' },
    'B': { name: 'Sangre', icon: 'tint', color: '#ef4444' },
    'C': { name: 'Cardiovascular', icon: 'heartbeat', color: '#f59e0b' },
    'D': { name: 'Dermatología', icon: 'hand-paper', color: '#8b5cf6' },

// ─── HELPERS ────────────────────────────────────────────────────────────────────
function fmtDate(iso) {
    const [y, m, d] = iso.split('-');
    return `${d}/${m}`;
}

function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function typeBadge(tipo) {
    const map = {
        nombre:           ['badge-nombre',    'nombre'],
        principio_activo: ['badge-pa',        'P.A.'],
        nregistro:        ['badge-nregistro', 'nº reg.'],
        atc:              ['badge-atc',       'ATC'],
        indicacion:       ['badge-indicacion','indicación'],
        codigo_nacional:  ['badge-cn',        'C.N.'],
    };
    const [cls, label] = map[tipo] || ['badge-nombre', tipo];
    return `<span class="badge ${cls}">${label}</span>`;
}

function escapeCSV(val) {
    const s = String(val ?? '');
    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
}

// ─── RENDER: Activity Chart Data ────────────────────────────────────────────────
function prepareActivityData(dias) {
    const end   = new Date();
    const start = new Date();
    start.setDate(start.getDate() - activeDias + 1);

    const map = {};
    (dias || []).forEach(d => { map[d.dia] = d.consultas; });

    const labels = [], values = [];
    const cur = new Date(start);
    while (cur <= end) {
        const key = cur.toISOString().slice(0, 10);
        labels.push(fmtDate(key));
        values.push(map[key] ?? 0);
        cur.setDate(cur.getDate() + 1);
    }
    return { labels, values };
}

// ─── RENDER: Clinical Taxonomy ──────────────────────────────────────────────────
function renderTaxonomy(data) {
    const hasData = data.por_vista?.length > 0;

    // Taxonomy reference table
    const refRows = Object.entries(TAXONOMY)
        .filter(([k]) => k !== 'perfil')
        .map(([key, t]) => `
            <tr>
                <td><span class="tax-dot" style="background:${t.color}"></span>${t.label}</td>
                <td>${t.ely}</td>
                <td>${t.section}</td>
            </tr>`).join('');

    // Drill-down by vista (top terms per category)
    let drillHtml = '';
    if (data.top_por_vista?.length) {
        const byVista = {};
        data.top_por_vista.forEach(t => {
            if (!byVista[t.vista]) byVista[t.vista] = [];
            if (byVista[t.vista].length < 5) byVista[t.vista].push(t);
        });

        const drillCards = Object.entries(byVista)
            .filter(([vista]) => TAXONOMY[vista] && vista !== 'perfil' && vista !== 'buscar')
            .map(([vista, terms]) => {
                const tax = TAXONOMY[vista];
                const items = terms.map(t =>
                    `<li><span>${escapeHtml(t.termino)}</span><span>${t.consultas}</span></li>`
                ).join('');
                return `
                <div class="drill-card">
                    <h4><i class="fas ${tax.icon}" style="color:${tax.color}"></i> ${tax.label}</h4>
                    <ul class="drill-list">${items}</ul>
                </div>`;
            }).join('');

        if (drillCards) {
            drillHtml = `
            <div style="margin-top:1.25rem">
                <div class="chart-card-title" style="margin-bottom:.5rem"><i class="fas fa-microscope"></i> Top términos por tipo de duda</div>
                <div class="drill-grid">${drillCards}</div>
            </div>`;
        }
    }

    return `
    <div class="chart-card" id="sec-taxonomy">
        <div class="chart-card-title"><i class="fas fa-th-list"></i> Tipo de duda clínica</div>
        <p class="chart-subtitle">Clasificación inspirada en la taxonomía de Ely et al. (BMJ 2000) y la ontología OntoFIS (Romá-Ferri 2009). Cada pestaña de MedCheck equivale a un tipo de duda clínica farmacológica.</p>
        ${hasData
            ? '<div class="chart-wrap" style="height:320px"><canvas id="taxonomy-chart"></canvas></div>'
            : '<div class="empty-state"><i class="fas fa-th-list"></i><p>Sin datos de vista clínica todavía</p><p class="note"><i class="fas fa-info-circle"></i> Las consultas incluyen la pestaña activa a partir de la actualización reciente</p></div>'
        }
        <details style="margin-top:1rem">
            <summary style="font-size:.78rem;color:var(--text-muted);cursor:pointer">
                <i class="fas fa-book"></i> Tabla de correspondencias Ely/OntoFIS
            </summary>
            <table class="taxonomy-ref">
                <thead><tr><th>Categoría MedCheck</th><th>Equivalencia Ely / OntoFIS</th><th>Sección FT</th></tr></thead>
                <tbody>${refRows}</tbody>
            </table>
        </details>
        ${drillHtml}
    </div>`;
}

// ─── RENDER: Top Terms ──────────────────────────────────────────────────────────
function renderTopTerms(terms) {
    if (!terms || !terms.length) return `
    <div class="table-card" id="sec-terms">
        <div class="chart-card-title"><i class="fas fa-list-ol"></i> Top términos buscados</div>
        <div class="empty-state"><i class="fas fa-search"></i><p>Sin datos de búsqueda</p></div>
    </div>`;

    const grouped = new Map();
    for (const t of terms) {
        if (!grouped.has(t.termino)) {
            grouped.set(t.termino, { termino: t.termino, tipo_busqueda: t.tipo_busqueda, consultas: 0 });
        }
        const g = grouped.get(t.termino);
        g.consultas += t.consultas;
    }
    const list = [...grouped.values()].sort((a, b) => b.consultas - a.consultas);
    const maxVal = list[0]?.consultas || 1;

    const rows = list.map(t => `
        <tr>
            <td class="term-name">${escapeHtml(t.termino)}</td>
            <td>${typeBadge(t.tipo_busqueda)}</td>
            <td>
                <div class="bar-wrap">
                    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(t.consultas/maxVal*100)}%"></div></div>
                    <span class="bar-count">${t.consultas}</span>
                </div>
            </td>
        </tr>`).join('');

    return `
    <div class="table-card" id="sec-terms">
        <div class="chart-card-title"><i class="fas fa-list-ol"></i> Top términos buscados</div>
        <table class="analytics-table">
            <thead><tr><th>Término</th><th>Tipo</th><th>Consultas</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>
    </div>`;
}

                <thead><tr><th>Código ATC</th><th>Grupo</th><th>Consultas</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
    }

    return `
    <div class="chart-card" id="sec-atc">
        <div class="chart-card-title"><i class="fas fa-pills"></i> Análisis por grupo terapéutico ATC</div>
        <p class="chart-subtitle">Distribución de consultas por clasificación Anatómica, Terapéutica, Química (OMS). Los códigos ATC se extraen automáticamente de cada respuesta de la API CIMA.</p>
        ${hasN1 ? '<div class="chart-wrap" style="height:400px"><canvas id="atc-chart"></canvas></div>' : ''}
        ${n2Html}
        ${topHtml}
    </div>`;
}

// ─── RENDER: Endpoints ──────────────────────────────────────────────────────────
function renderEndpoints(list) {
    if (!list || !list.length) return '';
    const total = list.reduce((s, e) => s + e.consultas, 0);
    const items = list.map(e => `
        <li class="endpoint-item">
            <span class="endpoint-path">${escapeHtml(e.endpoint)}</span>
            <span class="endpoint-count">${e.consultas} <small style="color:var(--text-muted);font-weight:400">(${Math.round(e.consultas/total*100)}%)</small></span>
        </li>`).join('');
    return `
    <details class="chart-card" style="cursor:pointer">
        <summary class="chart-card-title" style="margin-bottom:0"><i class="fas fa-server"></i> Endpoints API (técnico)</summary>
        <ul class="endpoint-list" style="margin-top:1rem">${items}</ul>
    </details>`;
}

// ─── BENCHMARK LOGIC ────────────────────────────────────────────────────────────
function initBenchmark(data) {
    const btn = document.getElementById('benchmark-calc-btn');
    const input = document.getElementById('benchmark-patients');
    if (!btn || !input) return;

    const calculate = () => {
        const patients = parseInt(input.value);
        if (!patients || patients < 1) return;

        localStorage.setItem('mc_benchmark_patients', patients);

        const rate = (data.resumen.total_consultas / patients) * 10;
        const louroTotal = 1.7;
        const enigmaTotal = 1.8;
        const pharmaLouro  = louroTotal * 0.069;  // 0.117
        const pharmaEnigma = enigmaTotal * 0.10;  // 0.18

        let interpretation, interpClass;
        if (rate < pharmaLouro) {
            interpretation = `Tu tasa (<strong>${rate.toFixed(2)}</strong> consultas farmacológicas/10 pacientes) es inferior al componente farmacológico estimado de Louro (${pharmaLouro.toFixed(2)}). Esto puede indicar un uso puntual de la herramienta o que resuelves muchas dudas por otros canales (interconsulta, colega, vademécum).`;
            interpClass = 'interp-low';
        } else if (rate <= pharmaEnigma * 2) {
            interpretation = `Tu tasa (<strong>${rate.toFixed(2)}</strong>) es consistente con el componente farmacológico estimado de los estudios (${pharmaLouro.toFixed(2)}–${pharmaEnigma.toFixed(2)}/10 pac). Estás resolviendo un volumen de dudas comparable a la frecuencia natural observada.`;
            interpClass = 'interp-normal';
        } else if (rate <= louroTotal) {
            interpretation = `Tu tasa (<strong>${rate.toFixed(2)}</strong>) supera el componente farmacológico puro (${pharmaEnigma.toFixed(2)}) pero es inferior a la tasa total de dudas clínicas (${louroTotal}/10). Sugiere un uso activo — MedCheck está capturando dudas que posiblemente antes no se buscaban.`;
            interpClass = 'interp-good';
        } else {
            interpretation = `Tu tasa (<strong>${rate.toFixed(2)}</strong>) supera la tasa total de dudas clínicas de Louro (${louroTotal}/10 pac). MedCheck parece haberse integrado como herramienta de consulta habitual, posiblemente reduciendo el 61% de dudas no buscadas que documentaba ENIGMA.`;
            interpClass = 'interp-high';
        }

        const resultDiv = document.getElementById('benchmark-result');
        if (resultDiv) {
            resultDiv.innerHTML = `
                <div class="benchmark-result">
                    <span class="benchmark-rate-value" style="color:var(--primary)">${rate.toFixed(2)}</span>
                    <span class="benchmark-rate-label">consultas farmacológicas / 10 pacientes</span>
                </div>
                <div class="benchmark-interpretation ${interpClass}">
                    <i class="fas fa-lightbulb"></i>
                    <span>${interpretation}</span>
                </div>
            `;
        }
    };

    btn.addEventListener('click', calculate);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });

    // Auto-calculate if saved value exists
    if (input.value) calculate();
}

// ─── EXPORT FUNCTIONS ───────────────────────────────────────────────────────────
function exportCSV() {
    if (!currentData) return;
    const data = currentData;
    const lines = [];
    const e = escapeCSV;

    lines.push('# MedCheck Analytics — Informe de consultas farmacológicas');
    lines.push(`# Periodo: ${activeDias} días`);
    lines.push(`# Generado: ${new Date().toISOString()}`);
    lines.push('');

    // Resumen
    lines.push('SECCION,RESUMEN');
    lines.push('Métrica,Valor');
    lines.push(`Total consultas,${data.resumen.total_consultas}`);
    lines.push(`Términos distintos,${data.resumen.terminos_distintos}`);
    lines.push(`Con resultado,${data.resumen.con_resultado}`);
    lines.push(`Sin resultado,${data.resumen.sin_resultado}`);
    lines.push('');

    // Actividad diaria
    lines.push('SECCION,ACTIVIDAD DIARIA');
    lines.push('Fecha,Consultas');
    (data.actividad_diaria || []).forEach(d => lines.push(`${d.dia},${d.consultas}`));
    lines.push('');

    // Top términos
    lines.push('SECCION,TOP TÉRMINOS');
    lines.push('Término,Tipo búsqueda,Consultas');
    (data.top_terminos || []).forEach(t =>
        lines.push(`${e(t.termino)},${e(t.tipo_busqueda)},${t.consultas}`)
    );
    lines.push('');

    // Por tipo de duda (vista)
    lines.push('SECCION,TIPO DE DUDA CLÍNICA');
    lines.push('Vista,Categoría Ely/OntoFIS,Sección FT,Consultas');
    (data.por_vista || []).forEach(v => {
        const tax = TAXONOMY[v.vista] || {};
        lines.push(`${e(v.vista)},${e(tax.ely || '—')},${e(tax.section || '—')},${v.consultas}`);
    });
    lines.push('');

    // Por contexto clínico
    if (data.por_contexto) {
        lines.push('SECCION,CONTEXTOS CLÍNICOS');
        lines.push('Contexto,Sección FT,Consultas con contexto activo');
        Object.entries(CONTEXTS).forEach(([key, info]) => {
            lines.push(`${e(info.label)},${e(info.section)},${data.por_contexto[key] || 0}`);
        });
        lines.push('');
    }

    // Por hora
    if (data.por_hora?.length) {
        lines.push('SECCION,DISTRIBUCIÓN HORARIA');
        lines.push('Hora,Consultas');
        data.por_hora.forEach(h => lines.push(`${h.hora},${h.consultas}`));
        lines.push('');
    }

    // Por día de semana
    if (data.por_dia_semana?.length) {
        lines.push('SECCION,DISTRIBUCIÓN SEMANAL');
        lines.push('Día,Consultas');
        data.por_dia_semana.forEach(d => lines.push(`${WEEKDAYS[d.dia_semana]},${d.consultas}`));
        lines.push('');
    }

    // Por tipo de búsqueda
    if (data.por_tipo_busqueda?.length) {
        lines.push('SECCION,MODALIDAD DE BÚSQUEDA');
        lines.push('Tipo,Consultas');
        data.por_tipo_busqueda.forEach(t => {
            const label = SEARCH_TYPES[t.tipo_busqueda]?.label || t.tipo_busqueda;
            lines.push(`${e(label)},${t.consultas}`);
        });
        lines.push('');
    }

    // ATC Nivel 1
    if (data.por_atc_nivel1?.length) {
        lines.push('SECCION,DISTRIBUCIÓN ATC NIVEL 1');
        lines.push('Código,Grupo anatómico,Consultas');
        data.por_atc_nivel1.forEach(a => {
            const info = ATC_LEVEL1[a.nivel1] || {};
            lines.push(`${a.nivel1},${e(info.name || 'Otro')},${a.consultas}`);
        });
        lines.push('');
    }

    // ATC Nivel 2
    if (data.por_atc_nivel2?.length) {
        lines.push('SECCION,DISTRIBUCIÓN ATC NIVEL 2');
        lines.push('Código,Subgrupo terapéutico,Consultas');
        data.por_atc_nivel2.forEach(a => {
            lines.push(`${a.nivel2},${e(ATC_LEVEL2[a.nivel2] || a.nivel2)},${a.consultas}`);
        });
        lines.push('');
    }

    // Top ATC codes
    if (data.top_atc?.length) {
        lines.push('SECCION,TOP CÓDIGOS ATC');
        lines.push('Código ATC,Consultas');
        data.top_atc.forEach(a => lines.push(`${a.atc_code},${a.consultas}`));
        lines.push('');
    }

    // Top por vista
    if (data.top_por_vista?.length) {
        lines.push('SECCION,TOP TÉRMINOS POR TIPO DE DUDA');
        lines.push('Vista,Término,Consultas');
        data.top_por_vista.forEach(t =>
            lines.push(`${e(t.vista)},${e(t.termino)},${t.consultas}`)
        );
    }

    const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `medcheck-analytics-${activeDias}d-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

function exportJSON() {
    if (!currentData) return;
    const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `medcheck-analytics-${activeDias}d-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

// ─── SECTION NAV ────────────────────────────────────────────────────────────────
function initSectionNav() {
    document.querySelectorAll('.snav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.snav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

                </div>

// ─── LOAD ───────────────────────────────────────────────────────────────────────
async function load() {
    const root = document.getElementById('analytics-root');
    const btn  = document.getElementById('refresh-btn');

    root.innerHTML = '<div class="state-loading"><i class="fas fa-spinner"></i><p>Cargando datos…</p></div>';
    btn.classList.add('loading');

    try {
        const data = await fetchAnalytics(activeDias);
        renderDashboard(data);
    } catch (err) {
        root.innerHTML = `
            <div class="state-error">
                <i class="fas fa-exclamation-triangle"></i>
                <p><strong>Error al cargar los datos</strong></p>
                <p style="font-size:.85rem;margin-top:.5rem">${escapeHtml(err.message)}</p>
            </div>`;
    } finally {
        btn.classList.remove('loading');
    }
}

// ─── EVENT LISTENERS ────────────────────────────────────────────────────────────
document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeDias = parseInt(btn.dataset.dias);
        load();
    });
});

document.getElementById('refresh-btn').addEventListener('click', load);

// ─── INIT ───────────────────────────────────────────────────────────────────────
load();
</script>

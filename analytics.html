<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedCheck · Analytics</title>
    <meta name="robots" content="noindex, nofollow">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/cima-app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <style>
        /* =============================================
           ANALYTICS — estilos específicos
           ============================================= */
        body { background: var(--bg-dark); color: var(--text-primary); font-family: 'Inter', sans-serif; }

        .analytics-layout {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 1rem 4rem;
        }

        /* HEADER */
        .analytics-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-default);
        }
        .analytics-brand {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .analytics-brand i { color: var(--primary); }
        .analytics-brand .brand-sub {
            font-size: .75rem;
            font-weight: 500;
            color: var(--primary);
            background: var(--primary-light);
            padding: .15rem .5rem;
            border-radius: 4px;
            margin-left: .2rem;
        }
        .back-link {
            font-size: .85rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .4rem;
            transition: color .15s;
        }
        .back-link:hover { color: var(--primary); }

        /* PERIOD SELECTOR */
        .period-bar {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
        }
        .period-label {
            font-size: .8rem;
            color: var(--text-muted);
            margin-right: .25rem;
        }
        .period-btn {
            padding: .35rem .9rem;
            border-radius: 6px;
            border: 1px solid var(--border-default);
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-size: .85rem;
            cursor: pointer;
            transition: all .15s;
        }
        .period-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
        .period-btn.active {
            background: var(--primary-light);
            border-color: var(--border-active);
            color: var(--primary);
            font-weight: 500;
        }
        .refresh-btn {
            margin-left: auto;
            padding: .35rem .9rem;
            border-radius: 6px;
            border: 1px solid var(--border-default);
            background: transparent;
            color: var(--text-muted);
            font-size: .85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: .4rem;
            transition: all .15s;
        }
        .refresh-btn:hover { color: var(--primary); border-color: var(--border-active); }
        .refresh-btn.loading i { animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SECTION NAV */
        .section-nav {
            display: flex;
            gap: .35rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            padding-bottom: .25rem;
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-dark);
            padding-top: .5rem;
        }
        .snav-btn {
            padding: .4rem .75rem;
            border-radius: 6px;
            border: 1px solid var(--border-default);
            background: var(--bg-surface);
            color: var(--text-muted);
            font-size: .78rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: .35rem;
        }
        .snav-btn:hover { color: var(--text-primary); border-color: var(--border-hover); }
        .snav-btn.active {
            background: var(--primary-light);
            border-color: var(--border-active);
            color: var(--primary);
        }

        /* SCROLL OFFSET FOR SECTIONS */
        [id^="sec-"] { scroll-margin-top: 3.5rem; }

        /* SUMMARY CARDS */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.75rem;
        }
        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: .3rem;
        }
        .stat-card .stat-label {
            font-size: .75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .04em;
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.1;
            color: var(--text-primary);
        }
        .stat-card .stat-note {
            font-size: .75rem;
            color: var(--text-muted);
        }
        .stat-card.accent-primary .stat-value { color: var(--primary); }
        .stat-card.accent-success .stat-value { color: #34d399; }
        .stat-card.accent-warn .stat-value { color: #fbbf24; }
        .stat-card.accent-purple .stat-value { color: #a78bfa; }

        /* CHARTS GRID */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .charts-grid-equal {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        @media (max-width: 700px) {
            .charts-grid, .charts-grid-equal { grid-template-columns: 1fr; }
        }

        /* CHART CARDS */
        .chart-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
        }
        .chart-card-title {
            font-size: .8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .chart-card-title i { color: var(--primary); }
        .chart-subtitle {
            font-size: .8rem;
            color: var(--text-muted);
            margin: -.5rem 0 1rem;
            line-height: 1.4;
        }
        .chart-wrap { position: relative; }

        /* TABLE CARD */
        .table-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
        }
        .analytics-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .875rem;
        }
        .analytics-table th {
            text-align: left;
            padding: .6rem .75rem;
            font-size: .7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-default);
        }
        .analytics-table td {
            padding: .65rem .75rem;
            border-bottom: 1px solid var(--border-default);
            color: var(--text-secondary);
            vertical-align: middle;
        }
        .analytics-table tr:last-child td { border-bottom: none; }
        .analytics-table tr:hover td { background: var(--bg-surface-hover); }
        .analytics-table .term-name {
            font-family: monospace;
            font-size: .9rem;
            color: var(--text-primary);
        }
        .analytics-table .badge {
            display: inline-block;
            padding: .1rem .45rem;
            border-radius: 4px;
            font-size: .7rem;
            font-weight: 500;
        }
        .badge-nombre { background: rgba(14,165,233,.15); color: #38bdf8; }
        .badge-nregistro { background: rgba(168,85,247,.15); color: #c084fc; }
        .badge-atc { background: rgba(52,211,153,.15); color: #34d399; }
        .badge-indicacion { background: rgba(251,191,36,.15); color: #fbbf24; }
        .badge-pa { background: rgba(52,211,153,.15); color: #34d399; }
        .badge-cn { background: rgba(251,191,36,.15); color: #fbbf24; }

        /* BAR INLINE */
        .bar-wrap { display: flex; align-items: center; gap: .6rem; }
        .bar-track {
            flex: 1;
            height: 6px;
            background: var(--bg-elevated, #263445);
            border-radius: 99px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 99px;
        }
        .bar-count { min-width: 1.8rem; text-align: right; font-weight: 600; color: var(--text-primary); }

        /* ENDPOINT LIST */
        .endpoint-list { list-style: none; padding: 0; margin: 0; }
        .endpoint-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .65rem 0;
            border-bottom: 1px solid var(--border-default);
            font-size: .875rem;
        }
        .endpoint-item:last-child { border-bottom: none; }
        .endpoint-path {
            font-family: monospace;
            color: var(--text-primary);
            font-size: .85rem;
        }
        .endpoint-count {
            font-weight: 600;
            color: var(--primary);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: .875rem;
        }
        .empty-state i { font-size: 1.75rem; display: block; margin-bottom: .75rem; opacity: .4; }
        .empty-state p { margin: 0; }
        .empty-state .note {
            margin-top: .5rem;
            font-size: .8rem;
            color: var(--primary);
            opacity: .8;
        }

        /* INFO BANNER */
        .info-banner {
            background: rgba(14,165,233,.08);
            border: 1px solid rgba(14,165,233,.25);
            border-radius: 8px;
            padding: .75rem 1rem;
            font-size: .8rem;
            color: var(--primary);
            display: flex;
            align-items: flex-start;
            gap: .6rem;
            margin-bottom: 1.5rem;
        }
        .info-banner i { margin-top: .05rem; flex-shrink: 0; }

        /* LOADING / ERROR */
        .state-loading, .state-error {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }
        .state-loading i, .state-error i {
            font-size: 2rem;
            display: block;
            margin-bottom: 1rem;
        }
        .state-loading i { color: var(--primary); animation: spin .8s linear infinite; }
        .state-error i { color: #f87171; }
        .state-error p { color: var(--text-secondary); }

        /* UPDATE TIMESTAMP */
        .update-ts {
            text-align: right;
            font-size: .75rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        /* TAXONOMY REF TABLE */
        .taxonomy-ref {
            width: 100%;
            border-collapse: collapse;
            font-size: .78rem;
            margin-top: 1rem;
        }
        .taxonomy-ref th {
            text-align: left;
            padding: .4rem .5rem;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-default);
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .taxonomy-ref td {
            padding: .35rem .5rem;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255,255,255,.03);
        }
        .taxonomy-ref tr:last-child td { border-bottom: none; }
        .taxonomy-ref .tax-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: .4rem;
        }

        /* DRILL-DOWN BY VISTA */
        .drill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: .75rem;
            margin-top: 1rem;
        }
        .drill-card {
            background: var(--bg-dark);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            padding: .75rem 1rem;
        }
        .drill-card h4 {
            font-size: .78rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: .5rem;
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .drill-card h4 i { font-size: .7rem; }
        .drill-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .drill-list li {
            font-size: .8rem;
            color: var(--text-muted);
            padding: .15rem 0;
            display: flex;
            justify-content: space-between;
        }
        .drill-list li span:last-child {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* BENCHMARK */
        .benchmark-panel { padding: .5rem 0; }
        .benchmark-your-data {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
        }
        .benchmark-stat { display: flex; flex-direction: column; }
        .benchmark-stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.1;
        }
        .benchmark-stat-label {
            font-size: .75rem;
            color: var(--text-muted);
            margin-top: .15rem;
        }
        .benchmark-calc {
            display: flex;
            align-items: center;
            gap: .5rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
            padding: 1rem;
            background: var(--bg-dark);
            border-radius: 8px;
            border: 1px solid var(--border-default);
        }
        .benchmark-input-label {
            font-size: .82rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .benchmark-input {
            width: 100px;
            padding: .4rem .6rem;
            border-radius: 6px;
            border: 1px solid var(--border-default);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-size: .9rem;
            font-family: inherit;
        }
        .benchmark-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .benchmark-result {
            text-align: center;
            margin: 1rem 0;
        }
        .benchmark-rate-value {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.1;
        }
        .benchmark-rate-label {
            font-size: .8rem;
            color: var(--text-muted);
            display: block;
            margin-top: .25rem;
        }
        .benchmark-interpretation {
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .85rem;
            line-height: 1.5;
            margin: 1rem 0;
            display: flex;
            align-items: flex-start;
            gap: .5rem;
        }
        .benchmark-interpretation i { margin-top: .15rem; flex-shrink: 0; }
        .interp-low { background: rgba(251,191,36,.08); color: #fbbf24; border: 1px solid rgba(251,191,36,.2); }
        .interp-normal { background: rgba(52,211,153,.08); color: #34d399; border: 1px solid rgba(52,211,153,.2); }
        .interp-good { background: rgba(14,165,233,.08); color: #0ea5e9; border: 1px solid rgba(14,165,233,.2); }
        .interp-high { background: rgba(168,85,247,.08); color: #c084fc; border: 1px solid rgba(168,85,247,.2); }
        .benchmark-refs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.25rem 0;
        }
        .benchmark-ref {
            background: var(--bg-dark);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            padding: 1rem;
        }
        .benchmark-ref-title {
            font-size: .85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: .25rem;
        }
        .benchmark-ref-detail {
            font-size: .75rem;
            color: var(--text-muted);
        }
        .benchmark-ref-rate {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin: .5rem 0 .25rem;
        }
        .benchmark-ref-rate small {
            font-size: .7rem;
            font-weight: 400;
            color: var(--text-muted);
        }
        .benchmark-ref-note {
            font-size: .75rem;
            color: var(--text-muted);
        }
        .benchmark-context {
            margin-top: 1rem;
            padding: .75rem 1rem;
            background: rgba(14,165,233,.05);
            border-radius: 8px;
            font-size: .8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .benchmark-context p { margin: 0 0 .5rem; }
        .benchmark-context p:last-child { margin-bottom: 0; }
        .benchmark-context i { color: var(--primary); }
        @media (max-width: 700px) {
            .benchmark-refs { grid-template-columns: 1fr; }
        }

        /* EXPORT */
        .export-actions {
            display: flex;
            gap: .75rem;
            flex-wrap: wrap;
        }
        .export-btn {
            padding: .6rem 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border-default);
            background: var(--bg-dark);
            color: var(--text-secondary);
            font-size: .85rem;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: .5rem;
            transition: all .15s;
        }
        .export-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .export-btn i { font-size: 1rem; }

        /* TAB SYSTEM */
        .tab-bar {
            display: flex;
            gap: .25rem;
            margin-bottom: 1.75rem;
            border-bottom: 2px solid var(--border-default);
            padding-bottom: 0;
            overflow-x: auto;
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-dark);
            padding-top: .5rem;
        }
        .tab-btn {
            padding: .65rem 1.1rem;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            background: transparent;
            color: var(--text-muted);
            font-size: .82rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .tab-btn:hover {
            color: var(--text-primary);
            border-bottom-color: var(--border-hover);
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-panel {
            display: none;
            animation: fadeIn .2s ease;
        }
        .tab-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 600px) {
            .tab-btn { padding: .5rem .7rem; font-size: .75rem; }
        }

        /* LAGUNAS */
        .laguna-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .5rem .75rem;
            border-bottom: 1px solid var(--border-default);
            font-size: .85rem;
        }
        .laguna-row:last-child { border-bottom: none; }
        .laguna-term {
            font-family: monospace;
            color: #f87171;
        }
        .laguna-count {
            font-weight: 600;
            color: var(--text-muted);
            font-size: .8rem;
        }

        /* RECURRENCE */
        .recurrence-badge {
            display: inline-block;
            padding: .1rem .4rem;
            border-radius: 4px;
            font-size: .7rem;
            font-weight: 500;
            background: rgba(168,85,247,.15);
            color: #c084fc;
        }

        /* SUCCESS RATE */
        .rate-good { color: #34d399; }
        .rate-ok { color: #fbbf24; }
        .rate-bad { color: #f87171; }

        /* INSIGHTS STRIP */
        .insights-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(195px, 1fr));
            gap: .75rem;
            margin-bottom: 1.5rem;
        }
        .insight-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: flex-start;
            gap: .75rem;
        }
        .insight-icon {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .insight-label {
            font-size: .7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        .insight-value {
            font-size: .95rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            margin-top: .1rem;
        }
        .insight-note {
            font-size: .72rem;
            color: var(--text-muted);
            margin-top: .1rem;
        }

        /* EDUCATIONAL PANEL */
        .edu-panel {
            background: rgba(14,165,233,.05);
            border: 1px solid rgba(14,165,233,.15);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
        }
        .edu-panel summary {
            font-size: .82rem;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: .4rem;
            list-style: none;
        }
        .edu-panel summary::after {
            content: '▾';
            margin-left: auto;
            font-size: .8rem;
            color: var(--text-muted);
        }
        .edu-panel[open] summary::after { content: '▴'; }
        .edu-panel summary::-webkit-details-marker { display: none; }
        .edu-refs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: .875rem 0;
        }
        @media (max-width: 600px) { .edu-refs-grid { grid-template-columns: 1fr; } }
        .edu-ref {
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            border-radius: 8px;
            padding: .875rem 1rem;
        }
        .edu-ref-title { font-size: .82rem; font-weight: 600; color: var(--text-primary); }

let activeDias = 30;

// ─── HELPERS ────────────────────────────────────────────────────────────────────
function fmtDate(iso) {
    const [y, m, d] = iso.split('-');
    return `${d}/${m}`;
}

function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function typeBadge(tipo) {
    const map = {
        nombre:           ['badge-nombre',    'nombre'],
        principio_activo: ['badge-pa',        'P.A.'],
        nregistro:        ['badge-nregistro', 'nº reg.'],
        atc:              ['badge-atc',       'ATC'],
        indicacion:       ['badge-indicacion','indicación'],
        codigo_nacional:  ['badge-cn',        'C.N.'],
    };
    const [cls, label] = map[tipo] || ['badge-nombre', tipo];
    return `<span class="badge ${cls}">${label}</span>`;
}

function escapeCSV(val) {
    const s = String(val ?? '');
    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
}

// Common chart scales
const GRID_SUBTLE = { color: 'rgba(255,255,255,.04)' };
const GRID_LIGHT  = { color: 'rgba(255,255,255,.06)' };
const TICK_STYLE  = { color: '#64748b', font: { size: 11 } };

// ─── FETCH ──────────────────────────────────────────────────────────────────────
async function fetchAnalytics(dias) {
    const res = await fetch(`${WORKER}/analytics?dias=${dias}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

// ─── RENDER: Summary ────────────────────────────────────────────────────────────
function renderSummary(r) {
    const pct = r.total_consultas > 0
        ? Math.round(r.sin_resultado / r.total_consultas * 100) : 0;
    const avgPerDay = (r.total_consultas / activeDias).toFixed(1);
    return `
    <div class="summary-grid" id="sec-resumen">
        <div class="stat-card accent-primary">
            <span class="stat-label"><i class="fas fa-search"></i> Total consultas</span>
            <span class="stat-value">${r.total_consultas}</span>
            <span class="stat-note">en ${activeDias} días · ${avgPerDay}/día</span>
        </div>
        <div class="stat-card">
            <span class="stat-label"><i class="fas fa-font"></i> Términos distintos</span>
            <span class="stat-value">${r.terminos_distintos}</span>
            <span class="stat-note">medicamentos únicos buscados</span>
        </div>
        <div class="stat-card accent-success">
            <span class="stat-label"><i class="fas fa-check-circle"></i> Con resultado</span>
            <span class="stat-value">${r.con_resultado}</span>
            <span class="stat-note">consultas con respuesta</span>
        </div>
        <div class="stat-card accent-warn">
            <span class="stat-label"><i class="fas fa-exclamation-circle"></i> Sin resultado</span>
            <span class="stat-value">${r.sin_resultado}</span>
            <span class="stat-note">${pct}% del total</span>
        </div>
    </div>`;
}

// ─── RENDER: Quick Insights Strip ───────────────────────────────────────────────
function renderInsights(data) {
    const items = [];

    // Top tipo de duda clínica
    if (data.por_vista?.length) {
        const top = [...data.por_vista]
            .filter(v => v.vista !== 'perfil')
            .sort((a, b) => b.consultas - a.consultas)[0];
        if (top) {
            const tax = TAXONOMY[top.vista] || {};
            items.push({
                label: 'Duda clínica más frecuente',
                value: tax.label || top.vista,
                note: `${top.consultas} consultas`,
                icon: tax.icon || 'fa-stethoscope',
                color: tax.color || 'var(--primary)',
                bg: (tax.color || '#0ea5e9') + '22',
            });
        }
    }

    // Top fármaco
    if (data.top_terminos?.length) {
        const top = data.top_terminos[0];
        const grouped = new Map();
        for (const t of data.top_terminos) {
            grouped.set(t.termino, (grouped.get(t.termino) || 0) + t.consultas);
        }
        const sorted = [...grouped.entries()].sort((a, b) => b[1] - a[1]);
        if (sorted.length) {
            items.push({
                label: 'Fármaco más consultado',
                value: sorted[0][0],
                note: `${sorted[0][1]} consulta${sorted[0][1] !== 1 ? 's' : ''}`,
                icon: 'fa-pills',
                color: '#a78bfa',
                bg: 'rgba(167,139,250,.15)',
            });
        }
    }

    // Top grupo ATC
    if (data.por_atc_nivel1?.length) {
        const top = [...data.por_atc_nivel1].sort((a, b) => b.consultas - a.consultas)[0];
        const info = ATC_LEVEL1[top.nivel1] || {};
        items.push({
            label: 'Grupo terapéutico principal',
            value: info.name || top.nivel1,
            note: `ATC ${top.nivel1} · ${top.consultas} consultas`,
            icon: 'fa-layer-group',
            color: info.color || '#34d399',
            bg: (info.color || '#34d399') + '22',
        });
    }

    // Top contexto clínico
    if (data.por_contexto) {
        const topCtx = Object.entries(CONTEXTS)
            .map(([k, v]) => ({ key: k, info: v, count: data.por_contexto[k] || 0 }))
            .filter(c => c.count > 0)
            .sort((a, b) => b.count - a.count)[0];
        if (topCtx) {
            items.push({
                label: 'Contexto clínico más activado',
                value: topCtx.info.label,
                note: `${topCtx.count} consultas con contexto activo`,
                icon: topCtx.info.icon || 'fa-user-injured',
                color: topCtx.info.color || '#fbbf24',
                bg: (topCtx.info.color || '#fbbf24') + '22',
            });
        }
    }

    if (!items.length) return '';

    const cards = items.map(ins => `
        <div class="insight-card">
            <div class="insight-icon" style="background:${ins.bg};color:${ins.color}">
                <i class="fas ${ins.icon}"></i>
            </div>
            <div>
                <div class="insight-label">${ins.label}</div>
                <div class="insight-value">${escapeHtml(ins.value)}</div>
                <div class="insight-note">${ins.note}</div>
            </div>
        </div>`).join('');

    return `
    <div class="insights-strip">${cards}</div>`;
}

// ─── RENDER: Activity Chart Data ────────────────────────────────────────────────
function prepareActivityData(dias) {
    const end   = new Date();
    const start = new Date();
    start.setDate(start.getDate() - activeDias + 1);

    const map = {};
    (dias || []).forEach(d => { map[d.dia] = d.consultas; });

    const labels = [], values = [];
    const cur = new Date(start);
    while (cur <= end) {
        const key = cur.toISOString().slice(0, 10);
        labels.push(fmtDate(key));
        values.push(map[key] ?? 0);
        cur.setDate(cur.getDate() + 1);
    }
    return { labels, values };
}

// ─── RENDER: Clinical Taxonomy ──────────────────────────────────────────────────
function renderTaxonomy(data) {
    const hasData = data.por_vista?.length > 0;

    // Taxonomy reference table
    const refRows = Object.entries(TAXONOMY)
        .filter(([k]) => k !== 'perfil')
        .map(([key, t]) => `
            <tr>
                <td><span class="tax-dot" style="background:${t.color}"></span>${t.label}</td>
                <td>${t.ely}</td>
                <td>${t.section}</td>
            </tr>`).join('');

    // Drill-down by vista (top terms per category)
    let drillHtml = '';
    if (data.top_por_vista?.length) {
        const byVista = {};
        data.top_por_vista.forEach(t => {
            if (!byVista[t.vista]) byVista[t.vista] = [];
            if (byVista[t.vista].length < 5) byVista[t.vista].push(t);
        });

        const drillCards = Object.entries(byVista)
            .filter(([vista]) => TAXONOMY[vista] && vista !== 'perfil' && vista !== 'buscar')
            .map(([vista, terms]) => {
                const tax = TAXONOMY[vista];
                const items = terms.map(t =>
                    `<li><span>${escapeHtml(t.termino)}</span><span>${t.consultas}</span></li>`
                ).join('');
                return `
                <div class="drill-card">
                    <h4><i class="fas ${tax.icon}" style="color:${tax.color}"></i> ${tax.label}</h4>
                    <ul class="drill-list">${items}</ul>
                </div>`;
            }).join('');

        if (drillCards) {
            drillHtml = `
            <div style="margin-top:1.25rem">
                <div class="chart-card-title" style="margin-bottom:.5rem"><i class="fas fa-microscope"></i> Top términos por tipo de duda</div>
                <div class="drill-grid">${drillCards}</div>
            </div>`;
        }
    }

    return `
    <div class="chart-card" id="sec-taxonomy">
        <div class="chart-card-title"><i class="fas fa-th-list"></i> Distribución por tipo de duda clínica</div>
        <p class="chart-subtitle">Qué tipo de pregunta farmacológica se plantea con más frecuencia — clasificación inspirada en la taxonomía de Ely et al. (BMJ 2000) y la ontología OntoFIS (Romá-Ferri 2009). Cada módulo principal de MedCheck equivale a un tipo de duda clínica farmacológica distinto.</p>
        ${hasData
            ? '<div class="chart-wrap" style="height:320px"><canvas id="taxonomy-chart"></canvas></div>'
            : '<div class="empty-state"><i class="fas fa-th-list"></i><p>Sin datos de vista clínica todavía</p><p class="note"><i class="fas fa-info-circle"></i> Las consultas incluyen la pestaña activa a partir de la actualización reciente</p></div>'
        }
        <details style="margin-top:1rem">
            <summary style="font-size:.78rem;color:var(--text-muted);cursor:pointer">
                <i class="fas fa-book"></i> Tabla de correspondencias Ely/OntoFIS
            </summary>
            <table class="taxonomy-ref">
                <thead><tr><th>Categoría MedCheck</th><th>Equivalencia Ely / OntoFIS</th><th>Sección FT</th></tr></thead>
                <tbody>${refRows}</tbody>
            </table>
        </details>
        ${drillHtml}
    </div>`;
}

// ─── RENDER: Secciones FT consultadas (modal de detalle) ────────────────────────
function renderSeccionesFT(data) {
    const secciones = data.por_seccion_ft;
    if (!secciones || !secciones.length) return `
    <div class="chart-card" id="sec-secciones-ft">
        <div class="chart-card-title"><i class="fas fa-book-open"></i> Secciones de Ficha Técnica consultadas</div>
        <p class="chart-subtitle">Requiere columna <code>seccion</code> en D1 y despliegue del Worker actualizado.</p>
        <div class="empty-state"><i class="fas fa-layer-group"></i><p>Sin datos de secciones aún</p></div>
    </div>`;

    const total = secciones.reduce((s, r) => s + r.consultas, 0);
    const maxVal = secciones[0]?.consultas || 1;

    // Top fármacos por sección (para el drill-down)
    const topBySec = {};
    (data.top_por_seccion || []).forEach(r => {
        if (!topBySec[r.seccion]) topBySec[r.seccion] = [];
        if (topBySec[r.seccion].length < 4) topBySec[r.seccion].push(r);
    });

    const rows = secciones.map(r => {
        const info = FT_SECTIONS[r.seccion] || { label: `Sección ${r.seccion}`, color: '#94a3b8', icon: 'fa-file-alt', ely: '—' };
        const pct = Math.round(r.consultas / total * 100);
        const topItems = (topBySec[r.seccion] || []).map(t => `<span class="tag-pill">${escapeHtml(t.termino)}</span>`).join('');
        return `
        <tr>
            <td><i class="fas ${info.icon}" style="color:${info.color};width:1.2rem"></i> <strong>${r.seccion}</strong></td>
            <td>${escapeHtml(info.label)}</td>
            <td><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(r.consultas/maxVal*100)}%;background:${info.color}"></div></div></td>
            <td style="text-align:right"><strong>${r.consultas}</strong> <span class="text-muted">(${pct}%)</span></td>

// ─── RENDER: Top Terms ──────────────────────────────────────────────────────────
function renderTopTerms(terms) {
    if (!terms || !terms.length) return `
    <div class="table-card" id="sec-terms">
        <div class="chart-card-title"><i class="fas fa-list-ol"></i> Top términos buscados</div>
        <div class="empty-state"><i class="fas fa-search"></i><p>Sin datos de búsqueda</p></div>
    </div>`;

    const grouped = new Map();
    for (const t of terms) {
        if (!grouped.has(t.termino)) {
            grouped.set(t.termino, { termino: t.termino, tipo_busqueda: t.tipo_busqueda, consultas: 0 });
        }
        const g = grouped.get(t.termino);
        g.consultas += t.consultas;
    }
    const list = [...grouped.values()].sort((a, b) => b.consultas - a.consultas);
    const maxVal = list[0]?.consultas || 1;

    const rows = list.map(t => `
        <tr>
            <td class="term-name">${escapeHtml(t.termino)}</td>
            <td>${typeBadge(t.tipo_busqueda)}</td>
            <td>
                <div class="bar-wrap">
                    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(t.consultas/maxVal*100)}%"></div></div>
                    <span class="bar-count">${t.consultas}</span>
                </div>
            </td>
        </tr>`).join('');

    return `
    <div class="table-card" id="sec-terms">
        <div class="chart-card-title"><i class="fas fa-list-ol"></i> Top términos buscados</div>
        <table class="analytics-table">
            <thead><tr><th>Término</th><th>Tipo</th><th>Consultas</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>
    </div>`;
}

// ─── RENDER: ATC Analysis ───────────────────────────────────────────────────────
function renderATC(data) {
    const hasN1 = data.por_atc_nivel1?.length > 0;
    const hasN2 = data.por_atc_nivel2?.length > 0;
    const hasTop = data.top_atc?.length > 0;

    if (!hasN1 && !hasN2 && !hasTop) {
        return `
        <div class="chart-card" id="sec-atc">
            <div class="chart-card-title"><i class="fas fa-pills"></i> Análisis por grupo terapéutico ATC</div>

                <i class="fas fa-pills"></i>
                <p>Datos ATC no disponibles todavía</p>
                <p class="note"><i class="fas fa-info-circle"></i> Los códigos ATC se extraen automáticamente de las respuestas CIMA tras la migración D1</p>
            </div>
        </div>`;
    }

    // Level 2 table
    let n2Html = '';
    if (hasN2) {
        const maxN2 = data.por_atc_nivel2[0]?.consultas || 1;
        const rows = data.por_atc_nivel2.map(item => {
            const label = ATC_LEVEL2[item.nivel2] || item.nivel2;
            const l1 = item.nivel2[0];
            const l1Info = ATC_LEVEL1[l1] || {};
            return `
            <tr>
                <td><span style="color:${l1Info.color || '#94a3b8'};font-weight:600;font-family:monospace">${escapeHtml(item.nivel2)}</span></td>
                <td>${escapeHtml(label)}</td>
                <td>
                    <div class="bar-wrap">
                        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(item.consultas/maxN2*100)}%;background:${l1Info.color || 'var(--primary)'}"></div></div>
                        <span class="bar-count">${item.consultas}</span>
                    </div>
                </td>
            </tr>`;
        }).join('');
        n2Html = `
        <div style="margin-top:1.25rem">
            <div class="chart-card-title" style="margin-bottom:.5rem"><i class="fas fa-layer-group"></i> Top subgrupos terapéuticos (Nivel 2)</div>
            <table class="analytics-table">
                <thead><tr><th>Código</th><th>Subgrupo terapéutico</th><th>Consultas</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
    }

    // Top ATC codes table
    let topHtml = '';
    if (hasTop) {
        const maxTop = data.top_atc[0]?.consultas || 1;
        const rows = data.top_atc.slice(0, 15).map(item => {
            const l1 = item.atc_code[0];
            const l1Info = ATC_LEVEL1[l1] || {};
            const l2Code = item.atc_code.substring(0, 3);
            const l2Label = ATC_LEVEL2[l2Code] || '';
            return `
            <tr>
                <td><span style="color:${l1Info.color || '#94a3b8'};font-weight:600;font-family:monospace">${escapeHtml(item.atc_code)}</span></td>
                <td>${escapeHtml(l2Label)}</td>
                <td>
                    <div class="bar-wrap">
                        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(item.consultas/maxTop*100)}%;background:${l1Info.color || 'var(--primary)'}"></div></div>
                        <span class="bar-count">${item.consultas}</span>
                    </div>
                </td>
            </tr>`;
        }).join('');
        topHtml = `
        <div style="margin-top:1.25rem">
            <div class="chart-card-title" style="margin-bottom:.5rem"><i class="fas fa-prescription-bottle-alt"></i> Top códigos ATC consultados (Nivel 5)</div>
            <table class="analytics-table">
                <thead><tr><th>Código ATC</th><th>Grupo</th><th>Consultas</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
    }

    // Wrap level-5 table in details for collapsing
    const topHtmlWrapped = topHtml ? `
        <details style="margin-top:.5rem">
            <summary style="font-size:.78rem;color:var(--text-muted);cursor:pointer;padding:.5rem 0">
                <i class="fas fa-prescription-bottle-alt"></i> Ver top códigos ATC nivel 5 (detalle molecular)
            </summary>
            ${topHtml}

    return `
    <div class="chart-card" id="sec-atc">
        <div class="chart-card-title"><i class="fas fa-layer-group"></i> Grupos terapéuticos consultados (Clasificación ATC)</div>
        <p class="chart-subtitle">Qué áreas terapéuticas generan más incertidumbre clínica. La clasificación ATC (Anatómica, Terapéutica, Química — OMS) agrupa los fármacos por sistema orgánico y mecanismo. Permite identificar especialidades y patologías con mayor demanda de consulta farmacológica.</p>

// ─── RENDER V2: Success Rate by search type ─────────────────────────────────────
function renderTasaExito(data) {
    const rates = data.tasa_exito;
    if (!rates || !rates.length) return '';

    const rows = rates.map(t => {
        const label = SEARCH_TYPES[t.tipo_busqueda]?.label || t.tipo_busqueda;
        const rate = t.tasa_exito ?? 0;
        const cls = rate >= 90 ? 'rate-good' : rate >= 70 ? 'rate-ok' : 'rate-bad';
        return `
        <tr>
            <td>${typeBadge(t.tipo_busqueda)} ${escapeHtml(label)}</td>
            <td style="text-align:center">${t.total}</td>
            <td style="text-align:center">${t.con_resultado}</td>
            <td style="text-align:right"><span class="${cls}" style="font-weight:700">${rate}%</span></td>
        </tr>`;
    }).join('');

    return `
    <div class="chart-card">
        <div class="chart-card-title"><i class="fas fa-bullseye"></i> Tasa de éxito por modalidad</div>
        <p class="chart-subtitle">Porcentaje de búsquedas que devuelven al menos un resultado, desglosado por tipo. Una tasa baja puede indicar problemas de cobertura o errores en la estrategia de búsqueda.</p>
        <table class="analytics-table">
            <thead><tr><th>Modalidad</th><th style="text-align:center">Total</th><th style="text-align:center">Con resultado</th><th style="text-align:right">Tasa éxito</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>
    </div>`;
}

// ─── RENDER: Endpoints ──────────────────────────────────────────────────────────
function renderEndpoints(list) {
    if (!list || !list.length) return '';
    const total = list.reduce((s, e) => s + e.consultas, 0);
    const items = list.map(e => `
        <li class="endpoint-item">
            <span class="endpoint-path">${escapeHtml(e.endpoint)}</span>
            <span class="endpoint-count">${e.consultas} <small style="color:var(--text-muted);font-weight:400">(${Math.round(e.consultas/total*100)}%)</small></span>
        </li>`).join('');
    return `
    <details class="chart-card" style="cursor:pointer">
        <summary class="chart-card-title" style="margin-bottom:0"><i class="fas fa-server"></i> Endpoints API (técnico)</summary>
        <ul class="endpoint-list" style="margin-top:1rem">${items}</ul>
    </details>`;
}

// ─── MOUNT CHARTS ───────────────────────────────────────────────────────────────
function mountCharts(data) {
    // Destroy existing
    Object.values(charts).forEach(c => c?.destroy());

    // 1. Activity chart (daily bar)
    const actCtx = document.getElementById('activity-chart')?.getContext('2d');
    if (actCtx) {
        const { labels, values } = prepareActivityData(data.actividad_diaria);
        charts.activity = new Chart(actCtx, {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: 'Consultas',
                    data: values,
                    backgroundColor: 'rgba(14,165,233,.6)',
                    borderColor: '#0ea5e9',
                    borderWidth: 1,
                    borderRadius: 4,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,

    // 7. ATC Level 1 chart

    // 9. Weekday chart

// ─── BENCHMARK LOGIC ────────────────────────────────────────────────────────────
function initBenchmark(data) {
    const btn = document.getElementById('benchmark-calc-btn');
    const input = document.getElementById('benchmark-patients');
    if (!btn || !input) return;

    const calculate = () => {
        const patients = parseInt(input.value);
        if (!patients || patients < 1) return;

        localStorage.setItem('mc_benchmark_patients', patients);

        const rate = (data.resumen.total_consultas / patients) * 10;
        const louroTotal = 1.7;
        const enigmaTotal = 1.8;
        const pharmaLouro  = louroTotal * 0.069;  // 0.117
        const pharmaEnigma = enigmaTotal * 0.10;  // 0.18

        let interpretation, interpClass;
        if (rate < pharmaLouro) {
            interpretation = `Tu tasa (<strong>${rate.toFixed(2)}</strong> consultas farmacológicas/10 pacientes) es inferior al componente farmacológico estimado de Louro (${pharmaLouro.toFixed(2)}). Esto puede indicar un uso puntual de la herramienta o que resuelves muchas dudas por otros canales (interconsulta, colega, vademécum).`;
            interpClass = 'interp-low';
        } else if (rate <= pharmaEnigma * 2) {
            interpretation = `Tu tasa (<strong>${rate.toFixed(2)}</strong>) es consistente con el componente farmacológico estimado de los estudios (${pharmaLouro.toFixed(2)}–${pharmaEnigma.toFixed(2)}/10 pac). Estás resolviendo un volumen de dudas comparable a la frecuencia natural observada.`;
            interpClass = 'interp-normal';
        } else if (rate <= louroTotal) {
            interpretation = `Tu tasa (<strong>${rate.toFixed(2)}</strong>) supera el componente farmacológico puro (${pharmaEnigma.toFixed(2)}) pero es inferior a la tasa total de dudas clínicas (${louroTotal}/10). Sugiere un uso activo — MedCheck está capturando dudas que posiblemente antes no se buscaban.`;
            interpClass = 'interp-good';
        } else {
            interpretation = `Tu tasa (<strong>${rate.toFixed(2)}</strong>) supera la tasa total de dudas clínicas de Louro (${louroTotal}/10 pac). MedCheck parece haberse integrado como herramienta de consulta habitual, posiblemente reduciendo el 61% de dudas no buscadas que documentaba ENIGMA.`;
            interpClass = 'interp-high';
        }

        const resultDiv = document.getElementById('benchmark-result');
        if (resultDiv) {
            resultDiv.innerHTML = `
                <div class="benchmark-result">
                    <span class="benchmark-rate-value" style="color:var(--primary)">${rate.toFixed(2)}</span>
                    <span class="benchmark-rate-label">consultas farmacológicas / 10 pacientes</span>
                </div>
                <div class="benchmark-interpretation ${interpClass}">
                    <i class="fas fa-lightbulb"></i>
                    <span>${interpretation}</span>
                </div>
            `;
        }
    };

    btn.addEventListener('click', calculate);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });

    // Auto-calculate if saved value exists
    if (input.value) calculate();
}

// ─── EXPORT FUNCTIONS ───────────────────────────────────────────────────────────
function exportCSV() {
    if (!currentData) return;
    const data = currentData;
    const lines = [];
    const e = escapeCSV;

    lines.push('# MedCheck Analytics — Informe de consultas farmacológicas');
    lines.push(`# Periodo: ${activeDias} días`);
    lines.push(`# Generado: ${new Date().toISOString()}`);
    lines.push('');

    // Resumen
    lines.push('SECCION,RESUMEN');
    lines.push('Métrica,Valor');
    lines.push(`Total consultas,${data.resumen.total_consultas}`);
    lines.push(`Términos distintos,${data.resumen.terminos_distintos}`);
    lines.push(`Con resultado,${data.resumen.con_resultado}`);
    lines.push(`Sin resultado,${data.resumen.sin_resultado}`);
    lines.push('');

    // Actividad diaria
    lines.push('SECCION,ACTIVIDAD DIARIA');
    lines.push('Fecha,Consultas');
    (data.actividad_diaria || []).forEach(d => lines.push(`${d.dia},${d.consultas}`));
    lines.push('');

    // Top términos
    lines.push('SECCION,TOP TÉRMINOS');
    lines.push('Término,Tipo búsqueda,Consultas');
    (data.top_terminos || []).forEach(t =>
        lines.push(`${e(t.termino)},${e(t.tipo_busqueda)},${t.consultas}`)
    );
    lines.push('');

    // Por tipo de duda (vista)
    lines.push('SECCION,TIPO DE DUDA CLÍNICA');
    lines.push('Vista,Categoría Ely/OntoFIS,Sección FT,Consultas');
    (data.por_vista || []).forEach(v => {
        const tax = TAXONOMY[v.vista] || {};
        lines.push(`${e(v.vista)},${e(tax.ely || '—')},${e(tax.section || '—')},${v.consultas}`);
    });
    lines.push('');

    // Por contexto clínico
    if (data.por_contexto) {
        lines.push('SECCION,CONTEXTOS CLÍNICOS');
        lines.push('Contexto,Sección FT,Consultas con contexto activo');
        Object.entries(CONTEXTS).forEach(([key, info]) => {
            lines.push(`${e(info.label)},${e(info.section)},${data.por_contexto[key] || 0}`);
        });
        lines.push('');
    }

    // Por hora
    if (data.por_hora?.length) {
        lines.push('SECCION,DISTRIBUCIÓN HORARIA');
        lines.push('Hora,Consultas');
        data.por_hora.forEach(h => lines.push(`${h.hora},${h.consultas}`));
        lines.push('');
    }

    // Por día de semana
    if (data.por_dia_semana?.length) {
        lines.push('SECCION,DISTRIBUCIÓN SEMANAL');
        lines.push('Día,Consultas');
        data.por_dia_semana.forEach(d => lines.push(`${WEEKDAYS[d.dia_semana]},${d.consultas}`));
        lines.push('');
    }

    // Por tipo de búsqueda
    if (data.por_tipo_busqueda?.length) {
        lines.push('SECCION,MODALIDAD DE BÚSQUEDA');
        lines.push('Tipo,Consultas');
        data.por_tipo_busqueda.forEach(t => {
            const label = SEARCH_TYPES[t.tipo_busqueda]?.label || t.tipo_busqueda;
            lines.push(`${e(label)},${t.consultas}`);
        });
        lines.push('');
    }

    // ATC Nivel 1
    if (data.por_atc_nivel1?.length) {
        lines.push('SECCION,DISTRIBUCIÓN ATC NIVEL 1');
        lines.push('Código,Grupo anatómico,Consultas');
        data.por_atc_nivel1.forEach(a => {
            const info = ATC_LEVEL1[a.nivel1] || {};
            lines.push(`${a.nivel1},${e(info.name || 'Otro')},${a.consultas}`);
        });
        lines.push('');
    }

    // ATC Nivel 2
    if (data.por_atc_nivel2?.length) {
        lines.push('SECCION,DISTRIBUCIÓN ATC NIVEL 2');
        lines.push('Código,Subgrupo terapéutico,Consultas');
        data.por_atc_nivel2.forEach(a => {
            lines.push(`${a.nivel2},${e(ATC_LEVEL2[a.nivel2] || a.nivel2)},${a.consultas}`);
        });
        lines.push('');
    }

    // Top ATC codes
    if (data.top_atc?.length) {
        lines.push('SECCION,TOP CÓDIGOS ATC');
        lines.push('Código ATC,Consultas');
        data.top_atc.forEach(a => lines.push(`${a.atc_code},${a.consultas}`));
        lines.push('');
    }

    // Top por vista
    if (data.top_por_vista?.length) {
        lines.push('SECCION,TOP TÉRMINOS POR TIPO DE DUDA');
        lines.push('Vista,Término,Consultas');
        data.top_por_vista.forEach(t =>
            lines.push(`${e(t.vista)},${e(t.termino)},${t.consultas}`)
        );
    }

    const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `medcheck-analytics-${activeDias}d-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

// ─── TAB SYSTEM ─────────────────────────────────────────────────────────────────
function initTabs(data) {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            const panel = document.getElementById(btn.dataset.tab);
            if (panel) {
                panel.classList.add('active');
                // Remount charts when switching tab (canvas needs visible container)
                requestAnimationFrame(() => mountCharts(data));
            }
        });
    });
}

                <div class="chart-card">
                    <div class="chart-card-title"><i class="fas fa-bullseye"></i> Tasa de resolución por modalidad</div>
                    <p class="chart-subtitle">Porcentaje de búsquedas con al menos un resultado según el identificador usado. Indica la eficacia de cada vía de búsqueda.</p>
                    ${data.tasa_exito?.length
                        ? '<div class="chart-wrap" style="height:220px"><canvas id="tasaexito-chart"></canvas></div>'
                        : '<div class="empty-state"><p>Sin datos</p></div>'
                    }
                </div>
            </div>

            ${renderTopTerms(data.top_terminos)}
            ${renderRecurrencia(data)}
            ${renderATC(data)}
            ${renderMisLagunas(data)}
        </div>

        <!-- ═══════ TAB: CONTEXTOS CLÍNICOS ═══════ -->
        <div class="tab-panel" id="tab-contextos">
            <div class="info-banner">
                <i class="fas fa-info-circle"></i>
                <span>Los <strong>contextos clínicos</strong> se activan manualmente antes de buscar un fármaco cuando hay un perfil de riesgo presente (embarazo, insuficiencia renal, paciente mayor…). Permiten analizar qué fármacos generan incertidumbre en <strong>pacientes complejos o vulnerables</strong>.</span>
            </div>
            ${renderContexts(data)}
            ${renderContextoCruce(data)}
        </div>

        <!-- ═══════ TAB: PATRONES Y DATOS ═══════ -->
        <div class="tab-panel" id="tab-patrones">
            ${renderTemporal(data)}
            ${renderExport()}
            ${renderEndpoints(data.por_endpoint)}
        </div>
    `;

    document.getElementById('analytics-root').innerHTML = html;

    // Timestamp
    const ts = document.getElementById('update-ts');
    if (ts) ts.textContent = `Actualizado: ${new Date().toLocaleTimeString('es-ES')}`;

    // Mount charts after DOM is ready
    requestAnimationFrame(() => mountCharts(data));

    // Init interactive elements
    initTabs(data);

    // Export buttons
    document.getElementById('export-csv')?.addEventListener('click', exportCSV);
    document.getElementById('export-json')?.addEventListener('click', exportJSON);
}

// ─── LOAD ───────────────────────────────────────────────────────────────────────
async function load() {
    const root = document.getElementById('analytics-root');
    const btn  = document.getElementById('refresh-btn');

    root.innerHTML = '<div class="state-loading"><i class="fas fa-spinner"></i><p>Cargando datos…</p></div>';
    btn.classList.add('loading');

    try {
        const data = await fetchAnalytics(activeDias);
        renderDashboard(data);
    } catch (err) {
        root.innerHTML = `
            <div class="state-error">
                <i class="fas fa-exclamation-triangle"></i>
                <p><strong>Error al cargar los datos</strong></p>
                <p style="font-size:.85rem;margin-top:.5rem">${escapeHtml(err.message)}</p>
            </div>`;
    } finally {
        btn.classList.remove('loading');
    }
}

// ─── EVENT LISTENERS ────────────────────────────────────────────────────────────
document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeDias = parseInt(btn.dataset.dias);
        load();
    });
});

document.getElementById('refresh-btn').addEventListener('click', load);

// ─── INIT ───────────────────────────────────────────────────────────────────────
load();
</script>
</body>
</html>

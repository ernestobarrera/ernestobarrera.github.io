<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMPASS · IA Clínica Reflexiva — Autoevaluación | @ernestob</title>
  <meta name="description"
    content="Herramienta interactiva de autoevaluación para profesionales sanitarios: integración segura y reflexiva de IA en la práctica clínica.">
  <link rel="icon" href="/assets/images/icon.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Playfair+Display:ital,wght@0,700;1,400;1,500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/header.css">
  <link rel="stylesheet" href="assets/css/footer.css">
  <link rel="stylesheet" href="assets/css/compass.css">
</head>

<body>
  <include src="header.html"></include>

  <!-- ═══ COMPASS TOOLBAR ═══ -->
  <div class="compass-bar">
    <div class="compass-bar-in">
      <div class="logo">
        <div class="logo-dot"></div>
        COMPASS
      </div>
      <nav class="stepper" aria-label="Progreso de la evaluación">
        <div class="stp-wrap" id="stepperInner"></div>
      </nav>
      <div class="compass-right">
        <div class="pct-badge" id="pctBadge" aria-label="Porcentaje completado"></div>
      </div>
    </div>
  </div>

  <!-- Mobile step indicator -->
  <div class="mobile-step-indicator" id="mobileStepInd" style="display:none" aria-live="polite"></div>

  <!-- ═══ GLOBAL PROGRESS BAR ═══ -->
  <div class="gpbar">
    <div class="gpbar-fill" id="gpbar" style="width:0%"></div>
  </div>

  <!-- ═══ MAIN APPLICATION ═══ -->
  <main class="main">
    <div id="app" aria-live="polite"></div>
  </main>

  <!-- ═══ FOOTER ═══ -->
  <div style="padding:6px 1rem;background:var(--bg);border-top:1px solid var(--brd);text-align:center">
    <span style="font-size:0.65rem;color:var(--tx4)">Basado en el Libro Blanco: IA y Toma de Decisiones Clínicas
      · © Ernesto Barrera 2026 · Herramienta educativa</span>
  </div>

  <include src="footer.html"></include>

  <script src="assets/js/compass-data.js"></script>
  <script src="assets/js/compass-app.js"></script>
  <script src="assets/js/include.js"></script>
</body>

</html>

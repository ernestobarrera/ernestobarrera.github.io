name: ETL BIFIMED (Financiación de Medicamentos SNS)

on:
  workflow_dispatch:
  schedule:
    # 08:17 UTC el día 3 de cada mes — BIFIMED actualiza con periodicidad mensual.
    - cron: '17 8 3 * *'

permissions:
  contents: read

concurrency:
  group: etl-bifimed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r scripts/etl-bifimed/requirements.txt

      - name: Descargar Excel BIFIMED y construir JSON
        id: build
        run: |
          python scripts/etl-bifimed/build_bifimed_catalog.py \
            --tmp-dir /tmp/bifimed_etl \
            --sentinels scripts/etl-bifimed/sentinels.json \
            --out bifimed_catalog.json
          {
            echo "size_kb=$(awk "BEGIN{printf \"%.0f\", $(stat -c%s bifimed_catalog.json)/1024}")"
            echo "total_cn=$(python -c "import json; d=json.load(open('bifimed_catalog.json')); print(d['meta']['total_cn'])")"
            echo "total_meds=$(python -c "import json; d=json.load(open('bifimed_catalog.json')); print(d['meta']['total_medicamentos'])")"
            echo "total_inds=$(python -c "import json; d=json.load(open('bifimed_catalog.json')); print(d['meta']['total_indicaciones'])")"
            echo "download_date=$(python -c "import json; d=json.load(open('bifimed_catalog.json')); print(d['meta']['download_date'])")"
          } >> "$GITHUB_OUTPUT"

      - name: Resumen
        run: |
          {
            echo "## ETL BIFIMED"
            echo ""
            echo "- CN únicos: \`${{ steps.build.outputs.total_cn }}\`"
            echo "- Medicamentos (filas brutas): \`${{ steps.build.outputs.total_meds }}\`"
            echo "- Indicaciones: \`${{ steps.build.outputs.total_inds }}\`"
            echo "- JSON: \`${{ steps.build.outputs.size_kb }} KB\`"
            echo "- Fecha descarga: \`${{ steps.build.outputs.download_date }}\`"
            echo ""
            echo "### Meta"
            echo '```json'
            python -c "import json; d=json.load(open('bifimed_catalog.json')); print(json.dumps(d['meta'], indent=2, ensure_ascii=False))"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Subir artefacto (retención 14 días)
        uses: actions/upload-artifact@v7
        with:
          name: bifimed-catalog-${{ steps.build.outputs.download_date }}
          path: bifimed_catalog.json
          retention-days: 14
          if-no-files-found: error

      - name: Publicar a Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/bifimed%3Afull" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @bifimed_catalog.json)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP ${status}"
          echo "$body" | jq .
          test "$status" = "200" || exit 1

      - name: Publicar meta a Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          jq -c '.meta' bifimed_catalog.json > bifimed_catalog_meta.json
          response=$(curl -sS -w "\n%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/bifimed%3Ameta" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @bifimed_catalog_meta.json)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP ${status}"
          echo "$body" | jq .
          test "$status" = "200" || exit 1
